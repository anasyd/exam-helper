services:
  server:
    image: ghcr.io/your-username/exam-helper-server:latest
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - BETTER_AUTH_SECRET=${SERVICE_PASSWORD_64_BETTERAUTH}
      - BETTER_AUTH_URL=${SERVICE_FQDN_SERVER_4000}
      - FRONTEND_URL=${SERVICE_FQDN_WEB_3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    image: ghcr.io/your-username/exam-helper-web:latest
    environment:
      - NEXT_PUBLIC_AUTH_URL=${SERVICE_FQDN_SERVER_4000}
    depends_on:
      server:
        condition: service_healthy
