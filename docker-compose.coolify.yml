services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    volumes:
      - mongo-data:/data/db
    environment:
      # SERVICE_PASSWORD_MONGOROOT — auto-generated once, reused by server via same identifier
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${SERVICE_PASSWORD_MONGOROOT}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  server:
    image: ghcr.io/anasyd/exam-helper-server:latest
    environment:
      - NODE_ENV=production

      # ── Manual secret — generate once: openssl rand -base64 32, paste in Coolify ─
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      # Same PASSWORD_MONGOROOT identifier as mongo service → same generated value
      - MONGODB_URI=mongodb://admin:${SERVICE_PASSWORD_MONGOROOT}@mongo:27017/examhelper?authSource=admin

      # ── Auto-assigned URLs (Coolify always sets SERVICE_URL_* with https://) ──────
      - SERVICE_FQDN_SERVER_4000=${SERVICE_FQDN_SERVER_4000}
      - BETTER_AUTH_URL=${SERVICE_URL_SERVER}
      - FRONTEND_URL=${SERVICE_URL_WEB}

      # ── Manual — fill in Coolify UI after deploy ─────────────────────────────
      - REGISTRATION_MODE=${REGISTRATION_MODE:-open}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # Google OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

      # Resend email (optional)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}

    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_AUTH_URL: ${SERVICE_URL_SERVER}
    environment:
      # ── Auto-assigned domain ──────────────────────────────────────────────────
      - SERVICE_FQDN_WEB_3000=${SERVICE_FQDN_WEB_3000}

      # ── Manual — set to "stripe" or "lemonsqueezy" to enable billing UI ──────
      - NEXT_PUBLIC_BILLING_PROVIDER=${NEXT_PUBLIC_BILLING_PROVIDER}

    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data: {}
