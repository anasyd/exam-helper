frontend:
  - changed-files:
    - any-glob-to-any-file: 'web/**'

backend:
  - changed-files:
    - any-glob-to-any-file: 'server/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'docker-compose*.yml'
      - '**/Dockerfile'

github-actions:
  - changed-files:
    - any-glob-to-any-file: '.github/**'
