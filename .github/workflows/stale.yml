name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          exempt-issue-labels: 'pinned,security,in-progress'
          exempt-pr-labels: 'pinned,in-progress'
