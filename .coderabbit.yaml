language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!.next/**"
    - "!**/*.lock"
    - "!package-lock.json"
    - "!**/tsconfig.tsbuildinfo"

chat:
  auto_reply: true
