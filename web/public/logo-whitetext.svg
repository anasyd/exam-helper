<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 32" role="img" aria-label="exam-helper">
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8b870"/>
      <stop offset="100%" stop-color="#8a5020"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff4d6"/>
      <stop offset="60%"  stop-color="#fcd98a"/>
      <stop offset="100%" stop-color="#c99252"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon mark -->
  <rect x="4"  y="5.5"  width="24" height="5" rx="2.5" fill="url(#bar)"/>
  <rect x="4"  y="13.5" width="16" height="5" rx="2.5" fill="url(#bar)"/>
  <rect x="4"  y="21.5" width="24" height="5" rx="2.5" fill="url(#bar)"/>
  <circle cx="24" cy="16" r="3.8" fill="url(#dot)" filter="url(#glow)"/>
  <!-- Wordmark — cream for dark backgrounds -->
  <text
    x="42"
    y="21"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="17"
    font-weight="300"
    letter-spacing="0.04em"
    fill="#f0ede6"
  >exam-helper</text>
</svg>
